  'chevron-down': <polyline points="6 9 12 15 18 9" />
};
function Icon({ name, size = 20, stroke = 1.75, className = '' }) {
  const content = ICON_PATHS[name] || null;
  return (
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width={size}
      height={size}
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      strokeWidth={stroke}
      strokeLinecap="round"
      strokeLinejoin="round"
      className={className}
      aria-hidden="true"
      style={{ display: 'inline-block', flexShrink: 0 }}>
      
          {content}
        </svg>);

}

          className="absolute inset-0 h-full w-full"

/* ---------------- Pipedrive Webform embed ----------------
   The hosted Pipedrive form handles validation, custom-field mapping,

const PIPEDRIVE_FORM_URL = 'https://webforms.pipedrive.com/f/1HGfaP5m0VZfWOOyMAbH89U9dlH472JRTgcTybKhnbbqymGQEIkXoWTz1gnMQHs5B';

function PipedriveForm() {
  useEffect(() => {
    // Inject the Pipedrive loader script once. It scans the page for
    // .pipedriveWebForms divs and replaces each with a sized iframe.
    if (document.querySelector('script[data-pd-webforms-loader]')) return;
    const s = document.createElement('script');
    s.src = 'https://webforms.pipedrive.com/f/loader';
    s.async = true;
    s.setAttribute('data-pd-webforms-loader', 'true');
    document.body.appendChild(s);
  }, []);
  return (
    <div className="pipedriveWebForms" data-pd-webforms={PIPEDRIVE_FORM_URL} style={{ minHeight: 560 }} />
  );
}

/* ---------------- App ---------------- */
function App() {
  const t = TWEAK_DEFAULTS;
  const scrollToRegister = () => {
    const el = document.getElementById('register');
    if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 64, behavior: 'smooth' });
  };

  // Apply primary CTA color globally via runtime style override.
  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--ae-cta', t.primaryCta);
    let s = document.getElementById('__ae_tweak_overrides');
    if (!s) { s = document.createElement('style'); s.id = '__ae_tweak_overrides'; document.head.appendChild(s); }
    s.textContent = `
      .bg-ae-dark-blue { background-color: ${t.primaryCta} !important; }
      .text-ae-dark-blue { color: ${t.primaryCta} !important; }
      .border-ae-dark-blue { border-color: ${t.primaryCta} !important; }
    `;
  }, [t.primaryCta]);

  return (
    <div className="font-sans">
          <Nav onRegister={scrollToRegister} />
          <Hero onRegister={scrollToRegister} patternOpacity={t.heroOverlay} />
          <TrustBar />
          <ValueProps />
          <Agenda />
          <Speakers tweaks={t} />
          <RegistrationSection />
          <FAQ />
          <Footer />
        </div>);

}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

// Smooth-scroll anchor links
document.addEventListener('click', (e) => {
  const a = e.target.closest('a[href^="#"]');
  if (!a) return;
  const id = a.getAttribute('href').slice(1);
  if (!id) return;
  const el = document.getElementById(id);
  if (el) {
    e.preventDefault();
    window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 64, behavior: 'smooth' });
  }
});
</script>
